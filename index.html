<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Cyber Runner 3D is a neon WebGL runner game built with Three.js."
    >
    <title>Cyber Runner 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="scanline-overlay" aria-hidden="true"></div>

    <section
      id="startScreen"
      class="screen-panel"
      aria-labelledby="startTitle"
    >
      <div class="panel-content">
        <p class="eyebrow">Neural link standby</p>
        <h1 id="startTitle">Memory Collapse</h1>
        <p class="panel-copy">Run the breach. Dodge corrupt blocks. Keep the stream alive.</p>
        <button id="startButton" class="prompt panel-action-button" type="button">
          START RUN
        </button>
      </div>
    </section>

    <main id="hud" class="hud" aria-label="Game HUD">
      <section class="hud-panel hud-panel-left" aria-label="Score">
        <div class="hud-row">
          <span class="hud-label">SCORE</span>
          <span id="score" class="hud-value">0</span>
        </div>

        <div class="hud-row">
          <span class="hud-label">HIGH SCORE</span>
          <span id="highScore" class="hud-value magenta">0</span>
        </div>
      </section>

      <section class="hud-panel hud-panel-center" aria-label="Memory fragments">
        <span class="hud-label">MEMORY FRAGMENTS</span>

        <div class="fragment-readout">
          <span id="fragments" class="fragment-value">0</span>
          <span class="fragment-max">/60</span>
        </div>
      </section>

      <section class="hud-panel hud-panel-right" aria-label="Run status">
        <div class="hud-row">
          <span class="hud-label">PHASE</span>
          <span id="phase" class="hud-value">1</span>
        </div>

        <div class="speed-meter">
          <div class="speed-header">
            <span class="hud-label">SPEED METER</span>
            <span id="velocity" class="velocity">240 KPH</span>
          </div>

          <div class="speed-track" aria-hidden="true">
            <div id="speedFill" class="speed-fill"></div>
          </div>
        </div>
      </section>
    </main>

    <div
      id="virtualControls"
      class="virtual-controls"
      role="group"
      aria-label="Game controls"
    >
      <div id="bottomControls" class="control-status">TAP START</div>

      <button
        id="moveLeftButton"
        class="control-button control-button-move control-button-left"
        type="button"
        aria-label="Move left"
      >
        <span class="control-circuit control-circuit-a" aria-hidden="true"></span>
        <span class="control-circuit control-circuit-b" aria-hidden="true"></span>
        <span class="control-icon" aria-hidden="true">&laquo;</span>
      </button>

      <button
        id="boostButton"
        class="control-button control-button-boost"
        type="button"
        aria-label="Boost speed"
      >
        <span class="boost-shell" aria-hidden="true">
          <svg class="boost-bolt" viewBox="0 0 24 24" focusable="false">
            <path d="M13 2 4 14h7l-1 8 10-13h-7l1-7z"></path>
          </svg>
          <span>BOOST</span>
        </span>
      </button>

      <button
        id="moveRightButton"
        class="control-button control-button-move control-button-right"
        type="button"
        aria-label="Move right"
      >
        <span class="control-circuit control-circuit-a" aria-hidden="true"></span>
        <span class="control-circuit control-circuit-b" aria-hidden="true"></span>
        <span class="control-icon" aria-hidden="true">&raquo;</span>
      </button>
    </div>

    <section
      id="gameOverPanel"
      class="screen-panel hidden"
      aria-labelledby="gameOverTitle"
    >
      <div class="panel-content danger">
        <p class="eyebrow">Connection terminated</p>
        <h2 id="gameOverTitle">Game Over</h2>

        <div class="result-grid">
          <div>
            <span class="hud-label">Final Score</span>
            <span id="finalScore" class="hud-value">0</span>
          </div>

          <div>
            <span class="hud-label">High Score</span>
            <span id="gameOverHighScore" class="hud-value">0</span>
          </div>
        </div>

        <button id="restartButton" class="prompt panel-action-button" type="button">
          RESTART RUN
        </button>
      </div>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
